syntax = "proto3";

option java_multiple_files = true;
option java_package = "analise.java.api.grpc.gen";
option java_outer_classname = "MusicServiceProto";

package music;

// ── Mensagens de request ─────────────────────────────────────────────────────

message Empty {}

message UsuarioRequest {
    int32 usuario_id = 1;
}

message PlaylistRequest {
    int32 playlist_id = 1;
}

message MusicaRequest {
    int32 musica_id = 1;
}

// ── Mensagens de dados ────────────────────────────────────────────────────────

message Usuario {
    int32 id = 1;
    string nome = 2;
    string data_nascimento = 3;
    string sexo = 4;
    string cidade_nascimento = 5;
}

message Musica {
    int32 id = 1;
    string titulo = 2;
    string artista = 3;
    string genero = 4;
    int32 duracao = 5;
}

message Playlist {
    int32 id = 1;
    string nome = 2;
    int32 usuario_id = 3;
    repeated int32 musicas = 4;
}

// ── Mensagens de response ─────────────────────────────────────────────────────

message UsuariosResponse {
    repeated Usuario usuarios = 1;
}

message MusicasResponse {
    repeated Musica musicas = 1;
}

message PlaylistsResponse {
    repeated Playlist playlists = 1;
}

// ── Serviço ───────────────────────────────────────────────────────────────────

service MusicService {
    // GET /usuarios
    rpc GetUsuarios (Empty) returns (UsuariosResponse);

    // GET /musicas
    rpc GetMusicas (Empty) returns (MusicasResponse);

    // GET /usuarios/<usuario_id>/playlists
    rpc GetPlaylistsUsuario (UsuarioRequest) returns (PlaylistsResponse);

    // GET /playlists/<playlist_id>/musicas
    rpc GetMusicasPlaylist (PlaylistRequest) returns (MusicasResponse);

    // GET /musicas/<musica_id>/playlists
    rpc GetPlaylistsComMusica (MusicaRequest) returns (PlaylistsResponse);
}
